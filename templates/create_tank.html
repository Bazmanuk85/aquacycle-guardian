{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Create Tank</h2>

<form method="post">

<input name="name" placeholder="Tank Name"><br><br>

<select name="tank_type">
<option>Freshwater</option>
<option>Marine</option>
<option>Brackish</option>
</select><br><br>

<input name="size_litres" placeholder="Tank Size (litres)"><br><br>

<button>Create</button>

</form>

</div>

{% endblock %}
