{% extends "base.html" %}
{% block content %}

<h2>Create Tank</h2>

<form action="/create-tank" method="post">

<label>Tank Name</label>
<input name="name">

<label>Type</label>
<select name="tank_type">
<option>Freshwater</option>
<option>Marine</option>
<option>Brackish</option>
</select>

<button type="submit">Create Tank</button>

</form>

<a href="/dashboard">Back</a>

{% endblock %}
