<!DOCTYPE html>
<html>
<head>
    <title>AquaGuardian</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        header {
            background: #0b3d5c;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
        }

        main {
            padding: 20px;
        }
    </style>

</head>

<body>

<header>
    <div>
        <!-- ✅ NO FORCED LOGO SIZE -->
        <img src="/static/logo.png">
        AquaGuardian
    </div>

    <nav>
        {% if request.cookies.get("user") %}
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        {% endif %}
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

</body>
</html>
