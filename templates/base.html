<!DOCTYPE html>
<html>
<head>
    <title>AquaGuardian</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #0b3d5c;
            color: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ✅ Original size */
        .logo img {
            height: 40px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        main {
            padding: 30px;
        }
    </style>

</head>

<body>

<header>

    <div class="logo">
        <img src="/static/logo.png">
        <h1>AquaGuardian</h1>
    </div>

    <nav>
        {% if request.cookies.get("user") %}
            <a href="/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        {% endif %}
    </nav>

</header>

<main>

{% block content %}
{% endblock %}

</main>

</body>
</html>
