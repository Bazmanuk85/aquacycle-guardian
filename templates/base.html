<!DOCTYPE html>
<html>

<head>

<title>AquaGuardian</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0b1d2a;
color:white;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#132c3f;
padding:25px;
margin-top:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

h1,h2,h3{
margin-top:0;
}

button{
background:#1e88e5;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
font-size:15px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#1565c0;
}

input, select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:none;
font-size:15px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th,td{
padding:10px;
text-align:center;
}

th{
border-bottom:2px solid #3a4d5c;
}

tr{
border-bottom:1px solid #1e3a50;
}

.topbar{
display:flex;
justify-content:space-between;
padding:10px 20px;
background:#06121a;
}

.topbar button{
background:#37474f;
}

.graph-container{
background:#0b1d2a;
padding:15px;
border-radius:10px;
margin-top:10px;
}

@media (max-width:600px){

.card{
padding:18px;
}

button{
width:100%;
margin-top:8px;
}

.topbar{
flex-direction:column;
gap:10px;
align-items:flex-start;
}

}

</style>

</head>

<body>

<div class="topbar">

<div>
<button onclick="history.back()">Back</button>
</div>

<div>
<a href="/logout"><button>Logout</button></a>
</div>

</div>

<div class="container">

{% block content %}{% endblock %}

</div>

</body>
</html>
