<!DOCTYPE html>
<html>

<head>

<title>AquaGuardian</title>

<style>

body{
font-family:Arial;
background:#0b1d2a;
color:white;
text-align:center;
}

.card{
background:#132c3f;
padding:30px;
margin:auto;
margin-top:40px;
width:400px;
border-radius:10px;
}

button{
padding:10px 20px;
margin:5px;
border-radius:8px;
border:none;
cursor:pointer;
}

.topbar{
position:fixed;
top:10px;
right:20px;
}

.back{
position:fixed;
top:10px;
left:20px;
}

.logo{
margin-top:30px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="logo">
<img src="/static/logo.png" width="160">
</div>

{% if request.cookies.get("user") %}

<div class="back">
<a href="/dashboard">
<button>Dashboard</button>
</a>
</div>

<div class="topbar">
<a href="/logout">
<button>Logout</button>
</a>
</div>

{% endif %}

{% block content %}{% endblock %}

</body>
</html>
