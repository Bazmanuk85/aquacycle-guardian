<html>

<head>

<title>AquaCycle Guardian</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:#38bdf8;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

a{
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<h1>Welcome {{ username }}</h1>

<a href="/create-tank"><button>Add Tank</button></a>

<br><br>

{% for tank in tanks %}

<div class="card">

<h2>
<a href="/tank/{{ tank.id }}">
{{ tank.name }}
</a>
</h2>

<p>{{ tank.volume }}L</p>

<a href="/delete-tank/{{ tank.id }}">
<button>Delete Tank</button>
</a>

</div>

{% endfor %}

</body>

</html>
