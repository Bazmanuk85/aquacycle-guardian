<html>

<head>

<title>AquaGuardian</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
font-size:28px;
color:#38bdf8;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:#38bdf8;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<div class="title">AquaGuardian</div>

<a href="/logout"><button>Logout</button></a>

</div>

<br>

<h2>Welcome {{ username }}</h2>

<a href="/create-tank"><button>Add Tank</button></a>

<br><br>

{% for tank in tanks %}

<div class="card">

<h2>
<a href="/tank/{{ tank.id }}">
{{ tank.name }}
</a>
</h2>

<p>{{ tank.volume }}L</p>

<a href="/delete-tank/{{ tank.id }}">
<button>Delete Tank</button>
</a>

</div>

{% endfor %}

</body>

</html>
