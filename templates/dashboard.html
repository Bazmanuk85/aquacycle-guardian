<html>

<head>

<title>AquaCycle Guardian</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:20px;
}

.header{
font-size:24px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:12px;
}

button{
background:#38bdf8;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

Welcome {{ username }}

</div>

<a href="/create-tank"><button>Add Tank</button></a>

<br><br>

<div class="grid">

{% for tank in tanks %}

<div class="card">

<h3>{{ tank.name }}</h3>

<p>{{ tank.volume }}L</p>

<a href="/tank/{{ tank.id }}">
<button>Open Tank</button>
</a>

</div>

{% endfor %}

</div>

</body>

</html>
