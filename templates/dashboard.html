{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Your Tanks</h2>

<a href="/create-tank">
<button>Create Tank</button>
</a>

</div>

{% for tank in tanks %}

<div class="card">

<h3>{{tank.name}}</h3>

<p>{{tank.tank_type}} • {{tank.size_litres}} L</p>

<a href="/tank/{{tank.id}}">
<button>Open Tank</button>
</a>

</div>

{% endfor %}

{% endblock %}
