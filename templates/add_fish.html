{% extends "base.html" %}

{% block content %}

<style>

.search-box{
width:100%;
padding:10px;
border-radius:8px;
border:none;
margin-bottom:10px;
}

.suggestions{
max-height:200px;
overflow-y:auto;
background:#0b1d2a;
border:1px solid #2e4b63;
border-radius:10px;
text-align:left;
}

.suggestion{
padding:8px;
cursor:pointer;
border-bottom:1px solid #1f3649;
}

.suggestion:hover{
background:#132c3f;
}

</style>


<div class="card">

<a href="/tank/{{tank.id}}">
<button>← Back to Tank</button>
</a>

<h2>Add Fish to {{tank.name}}</h2>

<form method="post">

<label>Fish Species</label>

<input
type="text"
name="species"
id="fishSearch"
class="search-box"
placeholder="Start typing fish name..."
required
>

<div id="suggestions" class="suggestions"></div>

<br>

<label>Quantity</label>
<br>

<input type="number" name="quantity" required>

<br><br>

<button type="submit">Add Fish</button>

</form>

</div>


<script>

const fishList = [
{% for fish in fish_list %}
"{{fish}}",
{% endfor %}
];

const search = document.getElementById("fishSearch");
const suggestions = document.getElementById("suggestions");

search.addEventListener("input", function(){

const value = this.value.toLowerCase();
suggestions.innerHTML = "";

if(value.length === 0){
return;
}

const matches = fishList.filter(fish =>
fish.toLowerCase().includes(value)
).slice(0,10);

matches.forEach(fish => {

const div = document.createElement("div");
div.classList.add("suggestion");
div.innerText = fish;

div.onclick = function(){
search.value = fish;
suggestions.innerHTML = "";
};

suggestions.appendChild(div);

});

});

</script>

{% endblock %}
