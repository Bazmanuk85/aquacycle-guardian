{% extends "base.html" %}

{% block content %}

<div class="card">

<a href="/tank/{{tank.id}}">
<button>← Back to Tank</button>
</a>

<h2>Add Fish to {{tank.name}}</h2>

<form method="post">

<label>Fish Species</label>
<br>

<input 
type="text" 
name="species"
list="fish-list"
placeholder="Start typing fish name..."
required
>

<datalist id="fish-list">

{% for fish in fish_list %}

<option value="{{fish}}">

{% endfor %}

</datalist>

<br><br>

<label>Quantity</label>
<br>

<input type="number" name="quantity" required>

<br><br>

<button type="submit">Add Fish</button>

</form>

<p style="font-size:13px;color:#8aaec6;margin-top:10px;">
If the species is not listed, simply type the name and it will be added.
</p>

</div>

{% endblock %}
