<html>

<head>

<title>AquaGuardian</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
max-width:420px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

button{
background:#38bdf8;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

.error{
color:#ef4444;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>Log Water Change</h1>

<div class="card">

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="post" action="/water-change/{{ tank_id }}">

<label>Water Change %</label>
<input type="number" name="percent" required>

<button type="submit">Save</button>

<a href="/tank/{{ tank_id }}">
<button type="button">Back</button>
</a>

</form>

</div>

</body>

</html>
