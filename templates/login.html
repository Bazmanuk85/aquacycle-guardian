<html>

<head>

<title>AquaGuardian</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#0f172a;
padding:40px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border-radius:5px;
border:none;
}

button{
width:100%;
padding:10px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
}

.error{
color:#ef4444;
margin-top:10px;
font-size:14px;
}

.title{
text-align:center;
font-size:22px;
margin-bottom:20px;
}

</style>

</head>

<body>

<div class="login-box">

<div class="title">AquaGuardian</div>

<form method="post" action="/login">

<input name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

{% if error %}

<div class="error">{{ error }}</div>

{% endif %}

</div>

</body>

</html>
