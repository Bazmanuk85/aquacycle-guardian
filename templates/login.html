<!DOCTYPE html>
<html>
<head>
<title>AquaGuardian Login</title>
</head>

<body>

<h2>AquaGuardian</h2>

<form action="/login" method="post">

<input name="username" placeholder="username">
<input name="password" type="password" placeholder="password">

<button type="submit">Login</button>

</form>

{% if error %}
<p>{{ error }}</p>
{% endif %}

</body>
</html>
