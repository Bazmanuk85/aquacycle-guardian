{% extends "base.html" %}

{% block content %}

<style>

.page-wrapper{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:70vh;
}

.login-card{
background:#132c3f;
padding:35px;
border-radius:16px;
width:320px;
box-shadow:0 0 20px rgba(31,127,209,0.4);
}

.login-card h2{
margin-top:0;
margin-bottom:20px;
}

.login-card input{
width:90%;
padding:12px;
margin:8px 0;
border:none;
border-radius:10px;
font-size:14px;
}

.login-card button{
width:95%;
padding:12px;
margin-top:12px;
border-radius:10px;
font-size:15px;
}

.error{
color:#ff6b6b;
margin-top:10px;
}

.logo{
margin-top:10px;
margin-bottom:15px;
}

.logo img{
width:260px;
border-radius:18px;
}

</style>


<div class="page-wrapper">

<div class="logo">
<img src="/static/logo.png">
</div>

<div class="login-card">

<h2>Login</h2>

<form method="post" action="/login">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

{% if error %}

<div class="error">
{{error}}
</div>

{% endif %}

</div>

</div>

{% endblock %}
