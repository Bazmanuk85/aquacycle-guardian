<!DOCTYPE html>
<html>
<head>

<title>Log Water Test - AquaGuardian</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:30px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin-bottom:12px;
border-radius:5px;
border:none;
}

button{
padding:10px 18px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<h1>Log Water Test</h1>

<div class="card">

<form method="post" action="/add-test/{{ tank_id }}">

<label>Ammonia</label>
<input type="number" step="0.01" name="ammonia" required>

<label>Nitrite</label>
<input type="number" step="0.01" name="nitrite" required>

<label>Nitrate</label>
<input type="number" step="0.01" name="nitrate" required>

<label>pH</label>
<input type="number" step="0.01" name="ph" required>

<label>Temperature</label>
<input type="number" step="0.1" name="temperature" required>

<button type="submit">Save Test</button>

</form>

<br>

<a href="/tank/{{ tank_id }}">
<button>Back</button>
</a>

</div>

</div>

</body>
</html>
