<html>

<head>

<title>AquaGuardian</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
max-width:420px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

button{
background:#38bdf8;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

</style>

</head>

<body>

<h1>Log Water Test</h1>

<div class="card">

<form method="post" action="/add-test/{{ tank_id }}">

<label>Ammonia (ppm)</label>
<input type="number" step="0.01" name="ammonia" required>

<label>Nitrite (ppm)</label>
<input type="number" step="0.01" name="nitrite" required>

<label>Nitrate (ppm)</label>
<input type="number" step="0.01" name="nitrate" required>

<label>pH</label>
<input type="number" step="0.1" name="ph" required>

<label>Temperature °C</label>
<input type="number" step="0.1" name="temperature" required>

<button type="submit">Save Test</button>

<a href="/tank/{{ tank_id }}">
<button type="button">Back</button>
</a>

</form>

</div>

</body>

</html>
