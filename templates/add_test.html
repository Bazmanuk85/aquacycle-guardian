<!DOCTYPE html>
<html>
<head>

<title>Log Water Test</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#1e293b;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:8px;
margin:6px 0 14px 0;
border:none;
border-radius:5px;
}

button{
background:#3b82f6;
border:none;
padding:10px;
width:100%;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.back{
margin-top:15px;
display:block;
color:#94a3b8;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Log Water Test</h2>

<form method="post">

<label>Ammonia</label>
<input type="number" step="0.01" name="ammonia">

<label>Nitrite</label>
<input type="number" step="0.01" name="nitrite">

<label>Nitrate</label>
<input type="number" step="0.01" name="nitrate">

<label>pH</label>
<input type="number" step="0.01" name="ph">

<label>Temperature</label>
<input type="number" step="0.1" name="temperature">

<button type="submit">Save</button>

</form>

<a class="back" href="/tank/{{tank_id}}">Back</a>

</div>

</body>
</html>
