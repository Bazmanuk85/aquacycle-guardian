<!DOCTYPE html>
<html>
<head>

<title>Log Water Test</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:30px;
}

input{
display:block;
margin:10px 0;
padding:8px;
width:200px;
}

button{
padding:10px 20px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>Log Water Test</h2>

<form method="post">

<label>Ammonia</label>
<input type="number" step="0.01" name="ammonia">

<label>Nitrite</label>
<input type="number" step="0.01" name="nitrite">

<label>Nitrate</label>
<input type="number" step="0.01" name="nitrate">

<label>pH</label>
<input type="number" step="0.01" name="ph">

<label>Temperature</label>
<input type="number" step="0.1" name="temperature">

<button type="submit">Save</button>

</form>

</body>
</html>
