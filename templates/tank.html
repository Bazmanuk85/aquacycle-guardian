<html>

<head>

<title>Tank Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
background:#38bdf8;
border:none;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<h2>{{ tank.name }}</h2>

<p>{{ tank.volume }}L Aquarium</p>

<a href="/dashboard"><button>Back</button></a>

<br><br>

<div class="card">

<h3>Aquarium Intelligence</h3>

{% if prediction %}

<p>{{ prediction }}</p>

{% else %}

<p>No prediction yet</p>

{% endif %}

</div>

<div class="card">

<h3>Fish Stock</h3>

{% for f in fish %}

<p>{{ f.species }} : {{ f.count }}</p>

{% endfor %}

</div>

<h3>Nitrogen Cycle</h3>

<canvas id="cycleChart"></canvas>

<script>

const ammonia = {{ ammonia }};
const nitrite = {{ nitrite }};
const nitrate = {{ nitrate }};

const labels = ammonia.map((_,i)=>"Test "+(i+1));

new Chart(document.getElementById('cycleChart'),{

type:'line',

data:{

labels:labels,

datasets:[

{label:'Ammonia',data:ammonia,borderColor:'#ef4444'},

{label:'Nitrite',data:nitrite,borderColor:'#3b82f6'},

{label:'Nitrate',data:nitrate,borderColor:'#22c55e'}

]

}

})

</script>

</body>

</html>
