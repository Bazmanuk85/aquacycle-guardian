<html>

<head>

<title>AquaGuardian</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
max-width:800px;
}

button{
background:#38bdf8;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

canvas{
background:#020617;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>{{ tank.name }}</h1>

<div class="card">

<a href="/add-test/{{ tank.id }}"><button>Log Water Test</button></a>
<a href="/water-change/{{ tank.id }}"><button>Log Water Change</button></a>
<a href="/dashboard"><button>Back</button></a>

</div>


<div class="card">

<h2>Water Parameters</h2>

<canvas id="waterChart"></canvas>

</div>


<script>

const labels = {{ labels | tojson }}

const data = {
labels: labels,
datasets: [

{
label: "Ammonia",
data: {{ ammonia | tojson }},
borderColor: "red",
tension: 0.3
},

{
label: "Nitrite",
data: {{ nitrite | tojson }},
borderColor: "orange",
tension: 0.3
},

{
label: "Nitrate",
data: {{ nitrate | tojson }},
borderColor: "green",
tension: 0.3
},

{
label: "pH",
data: {{ ph | tojson }},
borderColor: "blue",
tension: 0.3
},

{
label: "Temperature",
data: {{ temperature | tojson }},
borderColor: "purple",
tension: 0.3
}

]
}

new Chart(
document.getElementById("waterChart"),
{
type: "line",
data: data,
options: {
responsive: true,
plugins: {
legend: {
labels: { color: "white" }
}
},
scales: {
x: { ticks: { color: "white" } },
y: { ticks: { color: "white" } }
}
}
}
)

</script>

</body>

</html>
