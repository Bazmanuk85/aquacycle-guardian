<html>

<head>

<title>AquaGuardian</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#0f172a;
padding:25px;
border-radius:12px;
margin-bottom:30px;
max-width:950px;
}

button{
background:#38bdf8;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

canvas{
background:#020617;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>{{ tank.name }}</h1>

<div class="card">

<a href="/add-test/{{ tank.id }}"><button>Log Water Test</button></a>
<a href="/water-change/{{ tank.id }}"><button>Log Water Change</button></a>
<a href="/dashboard"><button>Back</button></a>

</div>


<div class="card">

<h2>Aquarium Water Chemistry</h2>

<canvas id="chart"></canvas>

</div>


<script>

const labels = {{ labels | tojson }}

const data = {

labels: labels,

datasets: [

{
label:"Ammonia",
data:{{ ammonia | tojson }},
borderColor:"#ef4444",
borderWidth:3,
pointRadius:5,
tension:0.4
},

{
label:"Nitrite",
data:{{ nitrite | tojson }},
borderColor:"#f59e0b",
borderWidth:3,
pointRadius:5,
tension:0.4
},

{
label:"Nitrate",
data:{{ nitrate | tojson }},
borderColor:"#22c55e",
borderWidth:3,
pointRadius:5,
tension:0.4
},

{
label:"pH",
data:{{ ph | tojson }},
borderColor:"#3b82f6",
borderWidth:3,
pointRadius:5,
tension:0.4
},

{
label:"Temperature",
data:{{ temperature | tojson }},
borderColor:"#a855f7",
borderWidth:3,
pointRadius:5,
tension:0.4
}

]

}

new Chart(

document.getElementById("chart"),

{
type:"line",
data:data,

options:{

responsive:true,

interaction:{
mode:"index",
intersect:false
},

plugins:{
legend:{
labels:{color:"white"}
}
},

scales:{
x:{
ticks:{color:"white"}
},
y:{
ticks:{color:"white"}
}
}

}

}

)

</script>

</body>

</html>
