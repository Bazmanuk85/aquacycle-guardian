{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>{{tank.name}}</h2>

<p>Type: {{tank.tank_type}}</p>
<p>Size: {{tank.size_litres}} L</p>

<h3>Tank Health</h3>
<p>{{health}} / 100</p>

<h3>Water Change Recommendation</h3>
<p>{{recommendation}} % required</p>

<br>

<a href="/tank/{{tank.id}}/add-test">
<button>Log Water Test</button>
</a>

<a href="/tank/{{tank.id}}/add-change">
<button>Log Water Change</button>
</a>

<br><br>

<h3>Water Parameter History</h3>

<div style="width:100%; background:#0b1d2a; padding:20px; border-radius:10px;">
<canvas id="waterChart" height="300"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const labels = [
{% for test in tests %}
"{{test.timestamp.strftime('%Y-%m-%d')}}",
{% endfor %}
]

const ammonia = [
{% for test in tests %}
{{test.ammonia or 0}},
{% endfor %}
]

const nitrite = [
{% for test in tests %}
{{test.nitrite or 0}},
{% endfor %}
]

const nitrate = [
{% for test in tests %}
{{test.nitrate or 0}},
{% endfor %}
]

const temperature = [
{% for test in tests %}
{{test.temperature or 0}},
{% endfor %}
]

const ctx = document.getElementById('waterChart');

new Chart(ctx, {
type: 'line',
data: {
labels: labels,
datasets: [
{
label: 'Ammonia',
data: ammonia,
borderColor: '#ff4d4d',
backgroundColor: 'transparent'
},
{
label: 'Nitrite',
data: nitrite,
borderColor: '#ffa64d',
backgroundColor: 'transparent'
},
{
label: 'Nitrate',
data: nitrate,
borderColor: '#66ff66',
backgroundColor: 'transparent'
},
{
label: 'Temperature',
data: temperature,
borderColor: '#4da6ff',
backgroundColor: 'transparent'
}
]
},
options: {
plugins: {
legend: {
labels: {
color: "white"
}
}
},
scales: {
x: {
ticks: { color: "white" }
},
y: {
ticks: { color: "white" }
}
}
}
});

</script>

{% endblock %}
