<html>

<head>
<title>Tank Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>{{ tank.name }}</h1>

<p>Volume: {{ tank.volume }}L</p>

<a href="/dashboard">Back</a>

<br><br>

<a href="/add-test/{{ tank.id }}">
<button>Log Water Test</button>
</a>

<hr>

<h2>Nitrogen Cycle Graph</h2>

<canvas id="cycleChart" width="600" height="300"></canvas>

<script>

const ammonia = {{ ammonia }};
const nitrite = {{ nitrite }};
const nitrate = {{ nitrate }};

const labels = ammonia.map((_, i) => "Test " + (i + 1));

new Chart(document.getElementById('cycleChart'), {

type: 'line',

data: {

labels: labels,

datasets: [

{
label: 'Ammonia',
data: ammonia,
borderColor: 'red'
},

{
label: 'Nitrite',
data: nitrite,
borderColor: 'blue'
},

{
label: 'Nitrate',
data: nitrate,
borderColor: 'green'
}

]

},

options: {

responsive: false

}

});

</script>

<hr>

<h2>Water Test History</h2>

{% for test in tests %}

<div>

Ammonia: {{ test.ammonia }} |
Nitrite: {{ test.nitrite }} |
Nitrate: {{ test.nitrate }} |
pH: {{ test.ph }} |
Temp: {{ test.temperature }}

</div>

<hr>

{% endfor %}

</body>

</html>
