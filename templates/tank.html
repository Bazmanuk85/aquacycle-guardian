<html>

<head>

<title>Tank</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:#38bdf8;
border:none;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<h1>{{ tank.name }}</h1>

<p>{{ tank.volume }}L Aquarium</p>

<a href="/dashboard"><button>Back</button></a>

<br><br>

<h2>Nitrogen Cycle</h2>

<canvas id="chart"></canvas>

<script>

const ammonia = {{ ammonia }};
const nitrite = {{ nitrite }};
const nitrate = {{ nitrate }};

const labels = ammonia.map((_,i)=>"Test "+(i+1));

new Chart(document.getElementById('chart'),{

type:'line',

data:{

labels:labels,

datasets:[

{label:'Ammonia',data:ammonia,borderColor:'#ef4444'},

{label:'Nitrite',data:nitrite,borderColor:'#3b82f6'},

{label:'Nitrate',data:nitrate,borderColor:'#22c55e'}

]

}

})

</script>

</body>

</html>
