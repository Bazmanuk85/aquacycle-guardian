<html>

<head>

<title>Tank Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

button{
background:#38bdf8;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

h1{
color:#38bdf8;
}

canvas{
max-width:300px;
margin:auto;
}

</style>

</head>

<body>

<h1>{{ tank.name }}</h1>

<p>{{ tank.volume }}L Aquarium</p>

<a href="/dashboard"><button>Back</button></a>

<br><br>

<a href="/add-test/{{ tank.id }}"><button>Log Water Test</button></
