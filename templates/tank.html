<html>

<head>

<title>AquaGuardian</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

button{
background:#38bdf8;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>{{ tank.name }}</h1>

<p>{{ tank.volume }}L Aquarium</p>

<a href="/dashboard"><button>Back</button></a>
<a href="/add-test/{{ tank.id }}"><button>Log Water Test</button></a>

<br><br>

<h2>Nitrogen Cycle</h2>

<canvas id="cycleChart"></canvas>

<script>

const ammonia = {{ ammonia | tojson }};
const nitrite = {{ nitrite | tojson }};
const nitrate = {{ nitrate | tojson }};
const labels = {{ dates | tojson }};

const ctx = document.getElementById("cycleChart").getContext("2d");

new Chart(ctx,{
    type: "line",
    data: {
        labels: labels,
        datasets: [
            {
                label: "Ammonia",
                data: ammonia,
                borderColor: "#ef4444",
                tension: 0.3
            },
            {
                label: "Nitrite",
                data: nitrite,
                borderColor: "#3b82f6",
                tension: 0.3
            },
            {
                label: "Nitrate",
                data: nitrate,
                borderColor: "#22c55e",
                tension: 0.3
            }
        ]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: {
                    color: "white"
                }
            }
        },
        scales: {
            x: {
                ticks: { color: "white" }
            },
            y: {
                ticks: { color: "white" }
            }
        }
    }
});

</script>

</body>

</html>
