<html>

<head>

<title>AquaGuardian</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:12px;
margin-bottom:25px;
max-width:900px;
}

button{
background:#38bdf8;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

canvas{
background:#020617;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>{{ tank.name }}</h1>

<div class="card">

<a href="/add-test/{{ tank.id }}"><button>Log Water Test</button></a>
<a href="/water-change/{{ tank.id }}"><button>Log Water Change</button></a>
<a href="/dashboard"><button>Back</button></a>

</div>


<div class="card">

<h2>Water Chemistry Trends</h2>

<canvas id="waterChart"></canvas>

</div>


<script>

const labels = {{ labels | tojson }}

const ammonia = {{ ammonia | tojson }}
const nitrite = {{ nitrite | tojson }}
const nitrate = {{ nitrate | tojson }}
const ph = {{ ph | tojson }}
const temperature = {{ temperature | tojson }}


const data = {
labels: labels,
datasets: [

{
label: "Ammonia",
data: ammonia,
borderColor: "#ef4444",
backgroundColor: "rgba(239,68,68,0.2)",
tension: 0.4
},

{
label: "Nitrite",
data: nitrite,
borderColor: "#f59e0b",
backgroundColor: "rgba(245,158,11,0.2)",
tension: 0.4
},

{
label: "Nitrate",
data: nitrate,
borderColor: "#22c55e",
backgroundColor: "rgba(34,197,94,0.2)",
tension: 0.4
},

{
label: "pH",
data: ph,
borderColor: "#3b82f6",
backgroundColor: "rgba(59,130,246,0.2)",
tension: 0.4
},

{
label: "Temperature",
data: temperature,
borderColor: "#a855f7",
backgroundColor: "rgba(168,85,247,0.2)",
tension: 0.4
}

]
}

new Chart(
document.getElementById("waterChart"),
{
type: "line",
data: data,
options: {

responsive: true,

interaction:{
mode:'index',
intersect:false
},

plugins:{
legend:{
labels:{color:"white"}
}
},

scales:{
x:{
ticks:{color:"white"}
},
y:{
ticks:{color:"white"}
}
}

}
}
)

</script>

</body>

</html>
